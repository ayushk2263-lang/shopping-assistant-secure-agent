repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: semgrep-local
        name: Semgrep Local Scan
        entry: python .semgrep/run_semgrep_mock.py
        language: system
        types: [python]
